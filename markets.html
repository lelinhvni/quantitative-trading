<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#070a14" />
  <title>Markets — JSS Capital</title>
  <meta name="description" content="Live ETF market data for SPY, QQQ and DIA — daily open and close, last 60-day high and low, and price history." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body data-page="markets">
  <a class="skip-link" href="#main">Skip to content</a>
  <div data-slot="header"></div>

  <main id="main">
    <section class="page-hero">
      <div class="container">
        <span class="kicker reveal">Markets</span>
        <h1 class="page-hero__title reveal">The ETFs we trade</h1>
        <p class="page-hero__lede reveal">Live data for SPY, QQQ and DIA — today's open and close, the last 60 trading days' high and low, and the full price history. <span class="data-source" id="dataSource"></span></p>
        <div class="markets__bar reveal">
          <button class="chip is-active" data-range="60">60 days</button>
          <button class="chip" data-range="30">30 days</button>
          <button class="chip" data-range="90">90 days</button>
          <button class="btn btn--ghost btn--sm" id="refreshBtn" type="button">↻ Refresh</button>
          <span class="markets__updated" id="updated"></span>
        </div>
      </div>
    </section>

    <section class="section section--tight">
      <div class="container">
        <div id="marketCards" class="market__list">
          <div class="snap__loading">Loading market data…</div>
        </div>
      </div>
    </section>
  </main>

  <div data-slot="footer"></div>

  <script src="scripts/config.js"></script>
  <script src="scripts/data.js"></script>
  <script src="scripts/site.js"></script>
  <script src="scripts/markets.js" defer></script>
</body>
</html>
