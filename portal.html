<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#070a14" />
  <title>Investor Portal — BPSQuant</title>
  <meta name="description" content="BPSQuant investor portal — track your capital, returns and statements. Fund manager view for oversight." />
  <meta property="og:title" content="Investor Portal — BPSQuant" />
  <meta property="og:description" content="Track your balance, monthly results, trade details and messages. Try the demo investor account." />
  <meta property="og:image" content="https://www.bpsquant.com/assets/og-image.svg" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css?v=20260722c" />
</head>
<body data-page="portal">
  <a class="skip-link" href="#main">Skip to content</a>
  <div data-slot="header"></div>

  <main id="main">
    <!-- Login view -->
    <section class="page-hero" id="loginView">
      <div class="container portal__login">
        <div class="login-card reveal">
          <span class="kicker">Investor portal</span>
          <h1 class="login-card__title">Sign in</h1>
          <p class="login-card__lede">Track your capital, returns and statements. Fund managers get an oversight view.</p>
          <form id="loginForm" novalidate>
            <div class="field"><label for="lemail">Email</label><input id="lemail" type="email" autocomplete="username" placeholder="you@example.com" required /></div>
            <div class="field"><label for="lpass">Password</label><input id="lpass" type="password" autocomplete="current-password" placeholder="••••••••" required /></div>
            <button type="submit" class="btn btn--primary" style="width:100%">Sign in</button>
            <div class="login-card__forgot"><button type="button" class="link-btn" id="forgotBtn">Forgot password?</button></div>
            <p class="cta__note" id="loginNote" role="status" aria-live="polite"></p>
          </form>
          <div class="login-card__demo" id="demoCredsBlock">
            <p>Try the demo investor account:</p>
            <button class="demo-cred" data-email="investor@bpsquant.example" data-pass="investor">Investor → investor@bpsquant.example / investor</button>
          </div>
        </div>
      </div>
    </section>

    <!-- App view -->
    <section class="section section--tight" id="appView" hidden>
      <div class="container">
        <div class="portal__topbar reveal">
          <div><h1 class="portal__hi" id="greeting"></h1><p class="portal__role" id="roleLine"></p></div>
          <button class="btn btn--ghost btn--sm" id="logoutBtn">Sign out</button>
        </div>
        <div id="portalBody"></div>
      </div>
    </section>
  </main>

  <div data-slot="footer"></div>

  <script src="scripts/config.js?v=20260722c"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="scripts/data.js?v=20260722c"></script>
  <script src="scripts/db.js?v=20260722c"></script>
  <script src="scripts/site.js?v=20260722c"></script>
  <script src="scripts/portal.js?v=20260722c" defer></script>
</body>
</html>
