# Pings the Supabase project daily so the free tier never sees
# 7 days of inactivity and pauses the database.
# The anon key is public by design (RLS is the security boundary),
# and this query returns no rows to anonymous callers — it only
# registers API activity.
name: Keep Supabase active

on:
  schedule:
    - cron: "23 9 * * *"   # daily at 09:23 UTC
  workflow_dispatch: {}     # allows manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping database via REST
        run: |
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml3d29nanJub2Fjam5ycHVremRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwODQyMDksImV4cCI6MjA5OTY2MDIwOX0.rFIpsjh0xTUaareu_JYqa1gDa9k5qmLtROSjLWZvPHA"
          code=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            "https://iwwogjrnoacjnrpukzdb.supabase.co/rest/v1/nav_history?select=date&limit=1" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY")
          echo "HTTP $code — $(cat /tmp/resp.txt)"
          # 200 (empty array for anon is fine) keeps the project active
          [ "$code" = "200" ] || exit 1
